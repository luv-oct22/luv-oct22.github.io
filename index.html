<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Model Capabilities Index</title>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #fafafa;
      color: #333;
      padding: 40px;
    }
    .header {
      max-width: 1100px;
      margin: 0 auto 24px;
    }
    .header h1 {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .header p {
      color: #666;
      font-size: 14px;
      line-height: 1.5;
    }
    .container {
      max-width: 1100px;
      margin: 0 auto;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      padding: 24px;
    }
    .filters {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 20px;
      align-items: center;
    }
    .filters label {
      font-size: 13px;
      font-weight: 600;
      color: #555;
      margin-right: 8px;
    }
    .btn {
      padding: 6px 14px;
      border: 1px solid #ddd;
      border-radius: 20px;
      background: #fff;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn:hover { border-color: #999; }
    .btn.active {
      background: #333;
      color: #fff;
      border-color: #333;
    }
    #chart {
      width: 100%;
      height: 520px;
    }
    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid #eee;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: #555;
    }
    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
    }
    .slider-container {
      margin-top: 16px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .slider-container label {
      font-size: 13px;
      font-weight: 600;
      color: #555;
    }
    .slider-container input[type="range"] {
      flex: 1;
      height: 4px;
    }
    .slider-container span {
      font-size: 13px;
      color: #666;
      min-width: 90px;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Model Capabilities Index</h1>
    <p>Tracking AI model performance over time across organizations. Interactive scatter plot with filtering by organization and time range.</p>
  </div>

  <div class="container">
    <div class="filters">
      <label>Organization:</label>
      <button class="btn active" data-org="all">All</button>
      <button class="btn" data-org="OpenAI">OpenAI</button>
      <button class="btn" data-org="Google">Google</button>
      <button class="btn" data-org="Anthropic">Anthropic</button>
      <button class="btn" data-org="Meta">Meta</button>
      <button class="btn" data-org="Mistral">Mistral</button>
      <button class="btn" data-org="DeepSeek">DeepSeek</button>
    </div>

    <div id="chart"></div>

    <div class="slider-container">
      <label>Time Range:</label>
      <input type="range" id="timeSlider" min="0" max="100" value="100">
      <span id="timeLabel">2020 - 2026</span>
    </div>

    <div class="legend" id="legend"></div>
  </div>

  <script>
    // Color palette
    const orgColors = {
      'OpenAI': '#e91e63',
      'Google': '#26a69a',
      'Anthropic': '#5c6bc0',
      'Meta': '#1976d2',
      'Mistral': '#f57c00',
      'DeepSeek': '#8e24aa',
    };

    // Generate random demo data
    function generateData() {
      const models = [
        // OpenAI
        {name: 'GPT-3', date: '2020-06-11', score: 48, org: 'OpenAI'},
        {name: 'GPT-3.5', date: '2022-11-30', score: 72, org: 'OpenAI'},
        {name: 'GPT-4', date: '2023-03-14', score: 98, org: 'OpenAI'},
        {name: 'GPT-4 Turbo', date: '2023-11-06', score: 108, org: 'OpenAI'},
        {name: 'GPT-4o', date: '2024-05-13', score: 118, org: 'OpenAI'},
        {name: 'o1', date: '2024-09-12', score: 135, org: 'OpenAI'},
        {name: 'o3', date: '2025-04-16', score: 156, org: 'OpenAI'},
        {name: 'GPT-5', date: '2025-08-01', score: 168, org: 'OpenAI'},
        // Google
        {name: 'PaLM', date: '2022-04-04', score: 62, org: 'Google'},
        {name: 'PaLM 2', date: '2023-05-10', score: 88, org: 'Google'},
        {name: 'Gemini 1.0', date: '2023-12-06', score: 105, org: 'Google'},
        {name: 'Gemini 1.5 Pro', date: '2024-02-15', score: 115, org: 'Google'},
        {name: 'Gemini 2.0', date: '2024-12-11', score: 138, org: 'Google'},
        {name: 'Gemini 2.5 Pro', date: '2025-03-25', score: 158, org: 'Google'},
        // Anthropic
        {name: 'Claude 1', date: '2023-03-14', score: 78, org: 'Anthropic'},
        {name: 'Claude 2', date: '2023-07-11', score: 90, org: 'Anthropic'},
        {name: 'Claude 3 Haiku', date: '2024-03-04', score: 95, org: 'Anthropic'},
        {name: 'Claude 3 Opus', date: '2024-03-04', score: 120, org: 'Anthropic'},
        {name: 'Claude 3.5 Sonnet', date: '2024-06-20', score: 130, org: 'Anthropic'},
        {name: 'Claude 4 Opus', date: '2025-05-22', score: 160, org: 'Anthropic'},
        // Meta
        {name: 'LLaMA', date: '2023-02-24', score: 65, org: 'Meta'},
        {name: 'LLaMA 2', date: '2023-07-18', score: 82, org: 'Meta'},
        {name: 'LLaMA 3', date: '2024-04-18', score: 105, org: 'Meta'},
        {name: 'LLaMA 3.1 405B', date: '2024-07-23', score: 122, org: 'Meta'},
        {name: 'LLaMA 4', date: '2025-04-05', score: 145, org: 'Meta'},
        // Mistral
        {name: 'Mistral 7B', date: '2023-09-27', score: 70, org: 'Mistral'},
        {name: 'Mixtral 8x7B', date: '2023-12-11', score: 85, org: 'Mistral'},
        {name: 'Mistral Large', date: '2024-02-26', score: 102, org: 'Mistral'},
        {name: 'Mistral Large 2', date: '2024-07-24', score: 118, org: 'Mistral'},
        {name: 'Mistral Medium 3', date: '2025-05-17', score: 140, org: 'Mistral'},
        // DeepSeek
        {name: 'DeepSeek V1', date: '2024-01-05', score: 88, org: 'DeepSeek'},
        {name: 'DeepSeek V2', date: '2024-05-16', score: 108, org: 'DeepSeek'},
        {name: 'DeepSeek V3', date: '2024-12-26', score: 135, org: 'DeepSeek'},
        {name: 'DeepSeek R1', date: '2025-01-20', score: 148, org: 'DeepSeek'},
      ];
      return models;
    }

    const allData = generateData();
    const chart = echarts.init(document.getElementById('chart'));

    let currentOrg = 'all';
    let currentMaxDate = new Date('2026-07-01');
    const minDate = new Date('2020-01-01');
    const maxDate = new Date('2026-07-01');

    function render() {
      let filtered = allData;
      if (currentOrg !== 'all') {
        filtered = filtered.filter(d => d.org === currentOrg);
      }
      filtered = filtered.filter(d => new Date(d.date) <= currentMaxDate);

      // Group by org for series
      const orgs = [...new Set(filtered.map(d => d.org))];
      const series = orgs.map(org => ({
        name: org,
        type: 'scatter',
        data: filtered.filter(d => d.org === org).map(d => ({
          value: [d.date, d.score],
          name: d.name,
        })),
        symbolSize: 14,
        itemStyle: { color: orgColors[org] },
        emphasis: {
          itemStyle: { borderColor: '#333', borderWidth: 2 },
          scale: 1.4,
        },
      }));

      const option = {
        animation: true,
        animationDuration: 400,
        tooltip: {
          trigger: 'item',
          backgroundColor: 'rgba(255,255,255,0.95)',
          borderColor: '#eee',
          borderWidth: 1,
          textStyle: { color: '#333', fontSize: 13 },
          formatter: function(params) {
            const org = params.seriesName;
            const color = orgColors[org];
            return `<div style="font-weight:600;margin-bottom:4px;">${params.data.name}</div>
                    <span style="color:${color};">${org}</span><br/>
                    <span style="color:#999;">Date:</span> ${params.data.value[0]}<br/>
                    <span style="color:#999;">Score:</span> ${params.data.value[1]}`;
          }
        },
        grid: {
          left: 60,
          right: 40,
          top: 20,
          bottom: 50,
        },
        xAxis: {
          type: 'time',
          name: 'Release Date',
          nameLocation: 'center',
          nameGap: 35,
          nameTextStyle: { fontSize: 13, color: '#666' },
          axisLine: { lineStyle: { color: '#ddd' } },
          axisTick: { lineStyle: { color: '#ddd' } },
          axisLabel: { color: '#666', fontSize: 12 },
          splitLine: { show: true, lineStyle: { color: '#f5f5f5' } },
          min: '2020-01-01',
          max: '2026-07-01',
        },
        yAxis: {
          type: 'value',
          name: 'Capability Score',
          nameLocation: 'center',
          nameGap: 40,
          nameTextStyle: { fontSize: 13, color: '#666' },
          axisLine: { lineStyle: { color: '#ddd' } },
          axisTick: { lineStyle: { color: '#ddd' } },
          axisLabel: { color: '#666', fontSize: 12 },
          splitLine: { lineStyle: { color: '#f5f5f5' } },
          min: 30,
          max: 180,
        },
        series: series,
      };

      chart.setOption(option, true);
    }

    // Filter buttons
    document.querySelectorAll('.btn').forEach(btn => {
      btn.addEventListener('click', function() {
        document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
        this.classList.add('active');
        currentOrg = this.dataset.org;
        render();
      });
    });

    // Time slider
    const slider = document.getElementById('timeSlider');
    const timeLabel = document.getElementById('timeLabel');

    slider.addEventListener('input', function() {
      const pct = this.value / 100;
      const range = maxDate.getTime() - minDate.getTime();
      currentMaxDate = new Date(minDate.getTime() + range * pct);
      const year = currentMaxDate.getFullYear();
      const month = String(currentMaxDate.getMonth() + 1).padStart(2, '0');
      timeLabel.textContent = `2020 - ${year}-${month}`;
      render();
    });

    // Build legend
    const legendEl = document.getElementById('legend');
    Object.entries(orgColors).forEach(([org, color]) => {
      legendEl.innerHTML += `
        <div class="legend-item">
          <div class="legend-dot" style="background:${color};"></div>
          ${org}
        </div>
      `;
    });

    // Responsive
    window.addEventListener('resize', () => chart.resize());

    // Initial render
    render();
  </script>
</body>
</html>
